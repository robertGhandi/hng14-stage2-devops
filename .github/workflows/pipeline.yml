name: CI/CD Pipeline

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python lint tools
        run: pip install flake8

      - name: Lint Python
        run: flake8 .

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend deps
        run: |
          cd frontend
          npm install

      - name: Lint JavaScript
        run: |
          cd frontend
          npx eslint .

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          cd api
          PYTHONPATH=. pytest --cov=. --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Wait for registry
        run: |
          for i in {1..10}; do
            curl -s http://localhost:5000/v2/ && break
            echo "Waiting for registry..."
            sleep 2
          done

      - name: Set image tag
        run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build API image
        run: docker build -t localhost:5000/api:${TAG} -t localhost:5000/api:latest ./api

      - name: Build Worker image
        run: docker build -t localhost:5000/worker:${TAG} -t localhost:5000/worker:latest ./worker

      - name: Build Frontend image
        run: docker build -t localhost:5000/frontend:${TAG} -t localhost:5000/frontend:latest ./frontend

      - name: Push images
        run: |
          docker push localhost:5000/api:${TAG}
          docker push localhost:5000/api:latest

          docker push localhost:5000/worker:${TAG}
          docker push localhost:5000/worker:latest

          docker push localhost:5000/frontend:${TAG}
          docker push localhost:5000/frontend:latest

  security-scan:
    runs-on: ubuntu-latest
    needs: build

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Wait for registry
        run: |
          for i in {1..10}; do
            curl -s http://localhost:5000/v2/ && break
            echo "Waiting for registry..."
            sleep 2
          done

      - name: Scan API image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: localhost:5000/api:latest
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Scan Worker image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: localhost:5000/worker:latest
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Scan Frontend image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: localhost:5000/frontend:latest
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .