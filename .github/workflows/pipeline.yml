name: CI/CD Pipeline

on:
  push:
    branches: ["*"]
  pull_request:

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install flake8
      - run: flake8 .

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - run: |
          cd frontend
          npm install
          npx eslint . || true

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true


  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          cd api
          pip install -r requirements.txt

      - run: |
          cd api
          PYTHONPATH=. pytest --cov=. --cov-report=xml

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml


  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Set TAG
        run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build images
        run: |
          docker build -t registry:5000/api:${TAG} -t registry:5000/api:latest ./api
          docker build -t registry:5000/worker:${TAG} -t registry:5000/worker:latest ./worker
          docker build -t registry:5000/frontend:${TAG} -t registry:5000/frontend:latest ./frontend

      - name: Push images
        run: |
          docker push registry:5000/api:${TAG}
          docker push registry:5000/api:latest

          docker push registry:5000/worker:${TAG}
          docker push registry:5000/worker:latest

          docker push registry:5000/frontend:${TAG}
          docker push registry:5000/frontend:latest


  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: registry:5000/api:latest
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Scan Worker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: registry:5000/worker:latest
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Scan Frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: registry:5000/frontend:latest
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif